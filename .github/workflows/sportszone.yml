name: SportsZone Scraper

on:
  schedule:
    # 11 AM Chile (CLT UTC-4 invierno / CLST UTC-3 verano)
    # Ajustar entre 14:00 y 15:00 UTC segun horario de verano/invierno
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl

      - name: Run SportsZone scraper
        run: php scrapers/sportszone/scraper.php

      - name: Commit and push playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f playlists/sportszone.m3u
          git diff --staged --quiet || git commit -m "chore: update sportszone playlist [skip ci]"
          git push
