name: Power Scraper

on:
  schedule:
    # 11 AM Chile (CLT UTC-4 invierno / CLST UTC-3 verano)
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl

      - name: Run Power scraper
        run: php scrapers/power/scraper.php

      - name: Commit and push playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f playlists/power.m3u
          git diff --staged --quiet || git commit -m "chore: update power playlist [skip ci]"
          git pull --rebase origin master
          git push
