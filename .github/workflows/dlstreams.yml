name: DaddyLive Scraper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl
      - run: php scrapers/dlstreams/scraper.php
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f playlists/dlstreams.m3u
          git diff --staged --quiet || git commit -m "chore: update dlstreams playlist [skip ci]"
          git pull --rebase origin master
          git push
